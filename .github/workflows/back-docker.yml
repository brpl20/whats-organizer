name: Backend Docker deploy
on:
  workflow_call:
    secrets:
      host:
        required: true
      username:
        required: true
      key:
        required: true
      port:
        required: true
      BACKEND_ENV:
        required: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: executing Backend Docker deployment using key
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.host }}
        username: ${{ secrets.username }}
        key: ${{ secrets.key }}
        port: ${{ secrets.port }}
        command_timeout: 15m
        script: |
          set -euo pipefail
          export PROJECT_DIR="/opt/whats-organizer"
          export BRANCH="master"
          export ERROR=false
          export DISK_USAGE=$(df -h / | awk 'NR==2{print $5}' | tr -d '%')
          export MESSAGE="Whats-Organizer-Backend-Docker:"
          export GIT_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          readonly PROJECT_DIR BRANCH DISK_USAGE GIT_URL

          # Clone or update repository
          if [ ! -d "${PROJECT_DIR}/.git" ]; then
            mkdir -p "${PROJECT_DIR}"
            cd "${PROJECT_DIR}"
            git clone --filter=blob:none "${GIT_URL}" .
          else
            cd "${PROJECT_DIR}"
            git remote set-url origin "${GIT_URL}"
            git fetch origin "${BRANCH}"
            git reset --hard "origin/${BRANCH}"
          fi

          # Write .env.backend from GitHub secret
          cat > "${PROJECT_DIR}/.env.backend" << 'ENVEOF'
          ${{ secrets.BACKEND_ENV }}
          ENVEOF
          chmod 600 "${PROJECT_DIR}/.env.backend"

          # Build and deploy
          cd "${PROJECT_DIR}"
          docker compose build || ERROR=true
          docker compose up -d --remove-orphans || ERROR=true

          # Wait for health checks
          sleep 15
          HEALTHY=false
          for port in 3000 3001; do
            CONTAINER="wo-backend-$(( port - 3000 ))"
            if docker exec "${CONTAINER}" python -c \
              "import urllib.request; urllib.request.urlopen('http://localhost:${port}/health')" 2>/dev/null; then
              echo "${CONTAINER} is healthy on port ${port}"
              HEALTHY=true
            else
              echo "${CONTAINER} NOT healthy on port ${port}"
            fi
          done

          if [ "${HEALTHY}" != "true" ]; then
            echo "CRITICAL: No backend is healthy!"
            docker compose logs --tail=50
            ERROR=true
          fi

          # Prune old images
          docker image prune -f || true

          # Notification
          if [ "${ERROR}" = "true" ]; then
            MESSAGE="${MESSAGE} Deploy FALHOU!"
          else
            MESSAGE="${MESSAGE} Deploy com sucesso!"
          fi
          [ "${DISK_USAGE}" -lt 90 ] || MESSAGE="${MESSAGE} *** AVISO: Disco Lotado ***"
          curl -sX POST "https://hooks.zapier.com/hooks/catch/1863715/215sl1w/" \
            -H "Content-Type: application/json" \
            -d "{ \"message\": \"${MESSAGE}\" }"
